# yaml-language-server: $schema=../../schema/local.json
# AgentGateway policy config — MODE 1: Identity-Based Access (AAuth spec §4.1.1)
#
# Pair with aauth-config-mode1.yaml.  The supply-chain-agent resource has no
# `access: require: auth-token`, so a valid aa-agent+jwt is sufficient.
# Policy rules check agent identity only — no PS-issued claims available.
#
# Usage: run agentgateway with this file instead of config-policy.yaml
config:
  tracing:
    otlpEndpoint: http://localhost:4317
    randomSampling: true
    fields:
      add:
        authenticated: 'jwt.sub != null'
        user_id: 'jwt.name'
        token_issuer: 'jwt.iss'
        token_audience: 'jwt.aud'
        aauth_scheme: 'aauth.scheme'
        aauth_agent_identity: 'aauth.agent'
        aauth_jwt_claims: 'aauth.jwt_claims'
        response_headers: 'response.headers'
        request_headers: 'request.headers'

  logging:
    fields:
      add:
        authenticated: 'jwt.sub != null'
        user_id: 'jwt.name'
        token_issuer: 'jwt.iss'
        token_audience: 'jwt.aud'
        aauth_scheme: 'aauth.scheme'
        aauth_agent_identity: 'aauth.agent'
        sig_key: 'request.headers["signature-key"]'


binds:
- port: 3000
  listeners:
  - hostname: "supply-chain-agent.localhost"
    routes:
    - name: a2a-authed
      matches:
      - path:
          exact: /
        method: "POST"
      - path:
          exact: /agent/authenticatedExtendedCard
      policies:
        authorization:
          rules:
          # We can use the agent's identity and the scopes/auth token claims to make policy decisions
          - 'extauthz.act.sub == extauthz.agent && extauthz.agent.endsWith("agent-server.example") && extauthz.scope.contains("supply-chain:read")'
        extAuthz:
          host: "localhost:7070"
          protocol:
            grpc:
              context:
                aauth_resource_id: "supply-chain-agent"
        a2a: {}
        backendAuth:
          passthrough: {}
        cors:
          allowOrigins:
            - "*"
          allowHeaders:
            - "*"
      backends:
      - host: localhost:9999
    - name: aauth-dwk
      matches:
      - path:
          pathPrefix: /.well-known/
      policies:
        urlRewrite:
          authority:
            full: supply-chain-agent.localhost:3000
      backends:
      - host: localhost:8081      

    - name: a2a-default
      policies:
        a2a: {}
        backendAuth:
          passthrough: {}
        cors:
          allowOrigins:
            - "*"
          allowHeaders:
            - "*"
      backends:
      - host: localhost:9999

  - hostname: "market-analysis-agent.localhost"
    routes:
    - name: a2a-authed
      matches:
      - path:
          exact: /
        method: "POST"
      - path:
          exact: /agent/authenticatedExtendedCard
      policies:
        extAuthz:
          host: "localhost:7070"
          protocol:
            grpc:
              context:
                aauth_resource_id: "market-analysis-agent"
        a2a: {}
        backendAuth:
          passthrough: {}
        cors:
          allowOrigins:
            - "*"
          allowHeaders:
            - "*"
      backends:
      - host: localhost:9998
    - name: aauth-dwk
      matches:
      - path:
          pathPrefix: /.well-known/
      policies:
        urlRewrite:
          authority:
            full: market-analysis-agent.localhost:3000
      backends:
      - host: localhost:8081      

    - name: a2a-default
      policies:
        a2a: {}
        backendAuth:
          passthrough: {}
        cors:
          allowOrigins:
            - "*"
          allowHeaders:
            - "*"
      backends:
      - host: localhost:9998

  - routes:
    - name: general-mcp
      matches:
      - path:
          pathPrefix: /general/mcp
      policies:
        cors:
          allowOrigins:
            - "*"
          allowHeaders:
            - "*"
      backends:
      - mcp:
          targets:
          - name: time
            stdio:
              cmd: uvx
              args: ["mcp-server-time"]
          - name: everything
            stdio:
              cmd: npx
              args: ["@modelcontextprotocol/server-everything"]
          - name: mcp-sequential-thinking
            stdio:
              cmd: npx
              args: ["@modelcontextprotocol/server-sequential-thinking"]
