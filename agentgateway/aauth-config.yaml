listen:
  grpc: ":7070"
  http: ":8081"

jwks_cache:
  success_ttl: 5m
  error_ttl: 30s
  max_entries: 1000

resources:
  - id: supply-chain-api
    issuer: http://localhost:8081
    hosts:
      - "supply-chain-agent.localhost:3000"
      - "supply-chain-agent.localhost"
    signing_key:
      kid: spa-rsk-1
      alg: EdDSA
      private_key_file: spa-resource-key.pem
    signature_window: 60s
    allow_pseudonymous: true
    policy:
      name: default

  - id: market-analysis-api
    issuer: http://localhost:8081
    hosts:
      - "market-analysis-agent.localhost:3000"
      - "market-analysis-agent.localhost"
    signing_key:
      kid: maa-rsk-1
      alg: EdDSA
      private_key_file: maa-resource-key.pem
    signature_window: 60s
    allow_pseudonymous: true
    policy:
      name: default
