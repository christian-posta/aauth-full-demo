# AAuth config — MODE 1: Identity-Based Access (AAuth spec §4.1.1)
#
# The resource accepts aa-agent+jwt directly.  No 401 challenge is issued,
# no resource token, no Person Server exchange.  Access is granted or denied
# purely based on the agent's cryptographic identity + local policy rules.
#
# Backend behavior: agent sends aa-agent+jwt → gets 200 (no retry needed).
#
# Usage: run agentgateway with this file instead of aauth-config.yaml
listen:
  grpc: ":7070"
  http: ":8081"

jwks_cache:
  success_ttl: 5m
  error_ttl: 30s
  max_entries: 1000

resources:
  - id: supply-chain-agent
    issuer: http://localhost:8081
    hosts:
      - localhost:8081
    authority_override: "supply-chain-agent.localhost:3000"
    signing_key:
      kid: spa-rsk-1
      alg: EdDSA
      private_key_file: spa-resource-key.pem
    signature_window: 60s
    allow_pseudonymous: false
    allowed_signature_key_schemes:
      - jwt
    allowed_jwt_types:
      - aa-agent+jwt        # only agent identity token; aa-auth+jwt never needed
    # No access: section  → resource never issues a 401 resource-token challenge
    # No person_server:   → no PS exchange; identity-only policy applies
    policy:
      name: default

  - id: market-analysis-agent
    issuer: http://localhost:8081
    authority_override: "market-analysis-agent.localhost:3000"
    signing_key:
      kid: maa-rsk-1
      alg: EdDSA
      private_key_file: maa-resource-key.pem
    signature_window: 60s
    allow_pseudonymous: true
    allowed_signature_key_schemes:
      - jwt
    allowed_jwt_types:
      - aa-agent+jwt
    policy:
      name: default
