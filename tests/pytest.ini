[pytest]
# Pytest configuration for AAuth integration tests

# Minimum Python version
minversion = 3.9

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    mode1: Mode 1 (identity-only) flow tests
    mode3: Mode 3 (auth-token) flow tests
    user_consent: User consent flow tests
    health: Health check tests
    slow: Slow tests (may take >5s)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (seconds)
timeout = 60

# Asyncio mode
asyncio_mode = auto

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test paths
testpaths = tests/integration

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS
